<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SIO-K9</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0b1020"><link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#080b13;--card:#111827;--soft:#172033;--line:#273449;--text:#f8fafc;--muted:#9ca3af;--red:#dc2626;--green:#16a34a;--blue:#2563eb;--yellow:#f59e0b}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06080f,#111827);color:var(--text);font-family:Arial,Helvetica,sans-serif}.wrap{max-width:1050px;margin:0 auto;padding:14px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;position:sticky;top:0;background:#080b13e8;backdrop-filter:blur(10px);z-index:5;padding:10px 0}.brand{display:flex;gap:10px;align-items:center}.brand img{width:48px;height:48px;border-radius:12px}.brand h1{font-size:22px;margin:0}.brand small{color:var(--muted)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 24px #0006;margin-bottom:12px}.login{max-width:420px;margin:13vh auto;text-align:center}.login img{width:112px;border-radius:24px}.login h1{font-size:32px;margin:12px 0 6px}input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #374151;background:#05070c;color:var(--text);font-size:16px}label{font-size:13px;color:#cbd5e1;font-weight:bold;margin:6px 0 5px;display:block}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#0b1220;border:1px solid #263244;border-radius:14px;padding:12px}.stat b{font-size:23px;display:block}.stat span{font-size:12px;color:var(--muted);text-transform:uppercase}.btn{border:0;border-radius:12px;padding:12px 14px;background:#1f2937;color:white;font-weight:800;font-size:15px;cursor:pointer}.btn.red{background:var(--red)}.btn.green{background:var(--green)}.btn.blue{background:var(--blue)}.btn.yellow{background:var(--yellow);color:#111827}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.tab{white-space:nowrap;border:1px solid var(--line);background:#111827;color:white;border-radius:999px;padding:10px 14px;font-weight:bold}.tab.active{background:var(--red);border-color:var(--red)}.hide{display:none!important}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.row>*{flex:1}.list{border-top:1px solid var(--line);margin-top:10px}.item{padding:10px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.item small{color:var(--muted)}.actions{display:flex;gap:6px;flex:0}.actions button{padding:8px 10px;font-size:12px}.warn{background:#3b1d1d;border:1px solid #7f1d1d;color:#fecaca;border-radius:12px;padding:10px;margin:8px 0}.ok{background:#132f20;border:1px solid #14532d;color:#bbf7d0;border-radius:12px;padding:10px;margin:8px 0}.muted{color:var(--muted)}.footer{text-align:center;color:var(--muted);font-size:12px;margin:16px}@media(max-width:700px){.grid,.grid3{grid-template-columns:1fr}.top{align-items:flex-start}.brand h1{font-size:18px}.tabs{position:sticky;top:70px;background:#080b13;padding:6px 0;z-index:4}.row{display:block}.row>*{margin-bottom:8px}.item{display:block}.actions{margin-top:8px}.stat b{font-size:20px}}
@media print{.tabs,.top button,.actions,.no-print{display:none!important}body{background:white;color:black}.card,.stat{box-shadow:none;border:1px solid #999;background:white;color:black}}
</style></head><body><div id="app"></div>
<script>
const VERSION='2.1.1'; const DB='sio_k9_db_v21'; const STORE='registros'; const CFG='config';
let state={tab:'dash', registros:[], editId:null, msg:''};
function $(s){return document.querySelector(s)} function br(n){return Number(n||0).toLocaleString('pt-BR',{maximumFractionDigits:3})}
function today(){return new Date().toISOString().slice(0,10)} function monthKey(d=today()){return (d||today()).slice(0,7)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function openDB(){return new Promise((res,rej)=>{let r=indexedDB.open(DB,1);r.onupgradeneeded=e=>{let db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'});if(!db.objectStoreNames.contains(CFG))db.createObjectStore(CFG,{keyPath:'key'});};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function tx(store,mode='readonly'){let db=await openDB();return db.transaction(store,mode).objectStore(store)}
async function all(){let s=await tx(STORE);return new Promise(res=>{let r=s.getAll();r.onsuccess=()=>res(r.result||[])})}
async function put(o){let s=await tx(STORE,'readwrite');return new Promise(res=>{s.put(o).onsuccess=res})}
async function del(id){let s=await tx(STORE,'readwrite');return new Promise(res=>{s.delete(id).onsuccess=res})}
async function getCfg(k){let s=await tx(CFG);return new Promise(res=>{let r=s.get(k);r.onsuccess=()=>res(r.result?.value)})}
async function setCfg(k,v){let s=await tx(CFG,'readwrite');return new Promise(res=>{s.put({key:k,value:v}).onsuccess=res})}
async function init(){if(!await getCfg('senha')) await setCfg('senha','1234'); state.registros=await all(); renderLogin()}
function renderLogin(){document.body.innerHTML='<div id="app"></div>'; $('#app').innerHTML=`<div class="login card"><img src="icon-192.png"><h1>SIO-K9</h1><p class="muted">Sistema Integrado de Operações - K9<br>v${VERSION}</p><input id="senha" type="password" placeholder="Senha"><button class="btn red" style="width:100%;margin-top:10px" onclick="login()">ENTRAR</button><p class="muted">Senha inicial: 1234</p></div>`}
async function login(){let pass=$('#senha').value; if(pass===await getCfg('senha')) render(); else alert('Senha incorreta')}
async function refresh(){state.registros=await all(); render()}
function layout(content){return `<div class="wrap"><div class="top"><div class="brand"><img src="icon-192.png"><div><h1>SIO-K9</h1><small>v${VERSION} • rápido e funcional</small></div></div><button class="btn" onclick="renderLogin()">Sair</button></div><div class="tabs"><button class="tab ${state.tab==='dash'?'active':''}" onclick="go('dash')">Dashboard</button><button class="tab ${state.tab==='bou'?'active':''}" onclick="go('bou')">Novo BOU</button><button class="tab ${state.tab==='sem'?'active':''}" onclick="go('sem')">Sem ilicitude</button><button class="tab ${state.tab==='consulta'?'active':''}" onclick="go('consulta')">Consultar</button><button class="tab ${state.tab==='backup'?'active':''}" onclick="go('backup')">Backup</button></div>${state.msg?`<div class="ok">${state.msg}</div>`:''}${content}<div class="footer">SIO-K9 • Sistema Integrado de Operações - K9 • v${VERSION}</div></div>`}
function go(t){state.tab=t; state.editId=null; state.msg=''; render()}
function render(){let content=''; if(state.tab==='dash')content=dash(); if(state.tab==='bou')content=formBou(); if(state.tab==='sem')content=formSem(); if(state.tab==='consulta')content=consulta(); if(state.tab==='backup')content=backup(); $('#app').innerHTML=layout(content)}
function totals(m=monthKey()){let rs=state.registros.filter(r=>(r.data||'').startsWith(m));let t={bou:0,pessoas:0,veiculos:0,armas:0,cocaina:0,maconha:0,crack:0,sinteticos:0,outros:0,visitas:0,visitantes:0,eventos:0,atingidas:0};rs.forEach(r=>{if(r.tipo==='bou'){t.bou++;t.pessoas+=+r.pessoas||0;t.veiculos+=+r.veiculos||0;t.armas+=+r.armas||0;t.cocaina+=+r.cocaina||0;t.maconha+=+r.maconha||0;t.crack+=+r.crack||0;t.sinteticos+=+r.sinteticos||0;t.outros+=+r.outros||0} if(r.tipo==='visita'){t.visitas++;t.visitantes+=+r.visitantes||0} if(r.tipo==='evento'){t.eventos++;t.atingidas+=+r.atingidas||0}});return t}
function dash(){let m=$('#mesDash')?.value||monthKey(); let t=totals(m);return `<div class="card"><div class="row"><h2>Dashboard mensal</h2><input id="mesDash" type="month" value="${m}" onchange="render()"></div></div><div class="grid3"><div class="stat"><b>${t.bou}</b><span>BOU</span></div><div class="stat"><b>${br(t.pessoas)}</b><span>Pessoas</span></div><div class="stat"><b>${br(t.veiculos)}</b><span>Veículos</span></div><div class="stat"><b>${br(t.armas)}</b><span>Armas</span></div><div class="stat"><b>${br(t.cocaina)} g</b><span>Cocaína</span></div><div class="stat"><b>${br(t.maconha)} g</b><span>Maconha</span></div><div class="stat"><b>${br(t.crack)} g</b><span>Crack</span></div><div class="stat"><b>${br(t.sinteticos)}</b><span>Sintéticos</span></div><div class="stat"><b>${br(t.outros)} g</b><span>Outros</span></div><div class="stat"><b>${t.visitas}</b><span>Visitas</span></div><div class="stat"><b>${br(t.visitantes)}</b><span>Visitantes</span></div><div class="stat"><b>${br(t.atingidas)}</b><span>Pessoas atingidas</span></div></div><div class="card no-print"><button class="btn red" onclick="go('bou')">+ Novo BOU</button> <button class="btn blue" onclick="go('sem')">+ Sem ilicitude</button> <button class="btn" onclick="window.print()">Imprimir resumo</button></div>`}
function formBou(){let r=state.editId?state.registros.find(x=>x.id===state.editId):{};return `<div class="card"><h2>${state.editId?'Editar':'Novo'} BOU</h2><div class="grid"><div><label>Data</label><input id="data" type="date" value="${r.data||today()}"></div><div><label>Nº do BOU</label><input id="bouNum" value="${r.bouNum||''}" placeholder="Ex: 2026/000000"></div></div><label>Natureza do fato</label><input id="natureza" value="${r.natureza||''}" placeholder="Ex: Tráfico, apoio, mandado..."><div class="grid"><div><label>Cão empregado (opcional)</label><input id="cao" value="${r.cao||''}"></div><div><label>Equipe (opcional)</label><input id="equipe" value="${r.equipe||''}"></div></div><h3>Apreensões</h3><div class="grid3"><div><label>Pessoas</label><input id="pessoas" type="number" value="${r.pessoas||0}"></div><div><label>Veículos</label><input id="veiculos" type="number" value="${r.veiculos||0}"></div><div><label>Armas</label><input id="armas" type="number" value="${r.armas||0}"></div></div><h3>Drogas / quantidade em gramas</h3><div class="grid3"><div><label>Cocaína</label><input id="cocaina" type="number" step="0.001" value="${r.cocaina||0}"></div><div><label>Maconha</label><input id="maconha" type="number" step="0.001" value="${r.maconha||0}"></div><div><label>Crack</label><input id="crack" type="number" step="0.001" value="${r.crack||0}"></div><div><label>Sintéticos (unid.)</label><input id="sinteticos" type="number" value="${r.sinteticos||0}"></div><div><label>Outros (g)</label><input id="outros" type="number" step="0.001" value="${r.outros||0}"></div></div><label>Observação</label><textarea id="obs" rows="3">${r.obs||''}</textarea><button class="btn green" onclick="saveBou()">SALVAR BOU</button></div>`}
async function saveBou(){let o={id:state.editId||uid(),tipo:'bou',data:$('#data').value||today(),bouNum:$('#bouNum').value,natureza:$('#natureza').value,cao:$('#cao').value,equipe:$('#equipe').value,pessoas:+$('#pessoas').value||0,veiculos:+$('#veiculos').value||0,armas:+$('#armas').value||0,cocaina:+$('#cocaina').value||0,maconha:+$('#maconha').value||0,crack:+$('#crack').value||0,sinteticos:+$('#sinteticos').value||0,outros:+$('#outros').value||0,obs:$('#obs').value,updated:new Date().toISOString()}; await put(o); state.msg='BOU salvo com sucesso.'; state.editId=null; await refresh(); state.tab='consulta'; render()}
function formSem(){return `<div class="card"><h2>Sem ilicitude</h2><div class="grid"><div><h3>Visita ao Canil</h3><label>Data</label><input id="vdata" type="date" value="${today()}"><label>Nº de visitantes</label><input id="visitantes" type="number" value="0"><button class="btn blue" onclick="saveVisita()">SALVAR VISITA</button></div><div><h3>Apresentação em evento</h3><label>Data</label><input id="edata" type="date" value="${today()}"><label>Nº pessoas atingidas</label><input id="atingidas" type="number" value="0"><button class="btn blue" onclick="saveEvento()">SALVAR APRESENTAÇÃO</button></div></div></div>`}
async function saveVisita(){await put({id:uid(),tipo:'visita',data:$('#vdata').value||today(),visitantes:+$('#visitantes').value||0,updated:new Date().toISOString()});state.msg='Visita registrada.'; await refresh(); state.tab='dash'; render()}
async function saveEvento(){await put({id:uid(),tipo:'evento',data:$('#edata').value||today(),atingidas:+$('#atingidas').value||0,updated:new Date().toISOString()});state.msg='Apresentação registrada.'; await refresh(); state.tab='dash'; render()}
function consulta(){let q=($('#q')?.value||'').toLowerCase();let m=$('#mesC')?.value||'';let rs=state.registros.filter(r=>(!m||(r.data||'').startsWith(m))&&(!q||JSON.stringify(r).toLowerCase().includes(q))).sort((a,b)=>(b.data||'').localeCompare(a.data||''));return `<div class="card"><h2>Consultar registros</h2><div class="row"><input id="q" placeholder="Buscar por BOU, natureza, data..." value="${q}" oninput="render()"><input id="mesC" type="month" value="${m}" onchange="render()"></div><div class="list">${rs.map(r=>item(r)).join('')||'<p class="muted">Nenhum registro encontrado.</p>'}</div></div>`}
function item(r){let titulo=r.tipo==='bou'?`BOU ${r.bouNum||''} • ${r.natureza||'Sem natureza'}`:r.tipo==='visita'?`Visita ao Canil • ${r.visitantes||0} visitantes`:`Apresentação • ${r.atingidas||0} pessoas`;let sub=r.tipo==='bou'?`Pessoas ${r.pessoas||0} • Veículos ${r.veiculos||0} • Armas ${r.armas||0} • Maconha ${br(r.maconha||0)}g • Cocaína ${br(r.cocaina||0)}g`:'';return `<div class="item"><div><b>${titulo}</b><br><small>${r.data||''} ${sub}</small></div><div class="actions">${r.tipo==='bou'?`<button class="btn blue" onclick="edit('${r.id}')">Editar</button>`:''}<button class="btn red" onclick="removeReg('${r.id}')">Excluir</button></div></div>`}
function edit(id){state.editId=id;state.tab='bou';render()} async function removeReg(id){if(confirm('Excluir este registro?')){await del(id);state.msg='Registro excluído.';await refresh()}}
function backup(){return `<div class="card"><h2>Backup</h2><p class="muted">Use antes de trocar de celular ou antes de uma atualização importante.</p><button class="btn green" onclick="exportBackup()">Exportar backup JSON</button> <label class="btn blue" style="display:inline-block;margin-top:8px">Restaurar backup<input type="file" accept="application/json" style="display:none" onchange="importBackup(event)"></label><hr style="border-color:#273449"><h3>Alterar senha</h3><input id="novaSenha" type="password" placeholder="Nova senha"><button class="btn red" onclick="trocarSenha()">Alterar senha</button></div>`}
function exportBackup(){let data={version:VERSION,created:new Date().toISOString(),registros:state.registros};let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='SIO-K9_backup_'+today()+'.json';a.click()}
async function importBackup(ev){let f=ev.target.files[0];if(!f)return;let data=JSON.parse(await f.text());if(!confirm('Restaurar backup? Isso vai adicionar/substituir registros com o mesmo ID.'))return;for(const r of (data.registros||[])) await put(r);state.msg='Backup restaurado.';await refresh()}
async function trocarSenha(){let v=$('#novaSenha').value.trim(); if(v.length<4){alert('Use pelo menos 4 caracteres.');return} await setCfg('senha',v); alert('Senha alterada.')} 
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})} init();
</script></body></html>
