<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#b91c1c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Canil_Mga</title>
<style>
:root{--bg:#080b10;--card:#111827;--muted:#9ca3af;--text:#f9fafb;--red:#dc2626;--green:#16a34a;--line:#253041;--input:#0b1220;--blue:#2563eb}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#05070a,#101827);color:var(--text);font-family:Arial,Helvetica,sans-serif}button,input,select{font:inherit}button{border:0;border-radius:12px;padding:12px 14px;font-weight:800;color:#fff;background:#374151}button.primary{background:var(--red)}button.green{background:var(--green)}button.blue{background:var(--blue)}button.ghost{background:#1f2937}button.danger{background:#991b1b}input,select{width:100%;padding:13px;border-radius:12px;border:1px solid #374151;background:var(--input);color:var(--text);outline:none}.wrap{max-width:980px;margin:auto;padding:14px 14px 80px}.top{display:flex;align-items:center;gap:12px;justify-content:space-between;margin-bottom:14px}.brand{display:flex;align-items:center;gap:10px}.brand img{width:48px;height:48px;border-radius:12px}.brand h1{font-size:20px;margin:0}.brand small{color:var(--muted)}.card{background:rgba(17,24,39,.92);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 10px 30px rgba(0,0,0,.18)}.login{min-height:100vh;display:grid;place-items:center;padding:18px}.login .box{width:100%;max-width:380px;text-align:center}.login img{width:112px;border-radius:25px;margin-bottom:12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:#0f172a;border:1px solid #263244;border-radius:14px;padding:12px}.stat b{font-size:22px;display:block}.stat span{font-size:12px;color:var(--muted);text-transform:uppercase}.tabs{position:fixed;bottom:0;left:0;right:0;background:#0b1220;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:10}.tabs button{border-radius:0;background:transparent;color:#d1d5db;padding:10px 4px;font-size:12px}.tabs button.active{color:#fff;background:#1f2937}.hidden{display:none}.title{display:flex;align-items:center;justify-content:space-between;gap:8px}.title h2{font-size:18px;margin:0 0 8px}.muted{color:var(--muted);font-size:13px}.list .item{border-top:1px solid var(--line);padding:12px 0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.sectionTitle{font-size:14px;color:#fca5a5;margin:16px 0 8px;font-weight:800}.ok{background:#052e16;border:1px solid #166534;color:#bbf7d0;padding:10px;border-radius:12px;margin:8px 0}.warn{background:#431407;border:1px solid #9a3412;color:#fed7aa;padding:10px;border-radius:12px;margin:8px 0}.pill{display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:5px 9px;font-size:12px;margin:3px}.right{text-align:right}@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}.tabs{position:static;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:12px}.tabs button{font-size:14px}.wrap{padding-bottom:20px}}@media(max-width:420px){.row,.row3{grid-template-columns:1fr}.stat b{font-size:19px}}
</style>
</head>
<body>
<div id="login" class="login">
  <div class="box card">
    <img src="icon-192.png" alt="Canil_Mga">
    <h1>Canil_Mga</h1>
    <p class="muted">Sistema de Registro Operacional<br>v2.0.0-alpha1 revisada</p>
    <input id="pass" type="password" placeholder="Senha">
    <div style="height:10px"></div>
    <button class="primary" onclick="login()" style="width:100%">ENTRAR</button>
    <p class="muted">Senha inicial: 1234</p>
  </div>
</div>
<div id="app" class="wrap hidden">
  <div class="top">
    <div class="brand"><img src="icon-96.png"><div><h1>Canil_Mga</h1><small id="mesAtual"></small></div></div>
    <button class="ghost" onclick="logout()">Sair</button>
  </div>
  <nav class="tabs">
    <button id="t-dash" class="active" onclick="show('dash')">Início</button>
    <button id="t-bou" onclick="show('bou')">BOU</button>
    <button id="t-sem" onclick="show('sem')">Sem ilic.</button>
    <button id="t-lista" onclick="show('lista')">Registros</button>
    <button id="t-backup" onclick="show('backup')">Backup</button>
  </nav>
  <section id="dash" class="screen">
    <div class="card title"><h2>Dashboard mensal</h2><select id="filtroMes" onchange="render()"></select></div>
    <div id="stats" class="grid"></div>
  </section>
  <section id="bou" class="screen hidden">
    <div class="card"><h2>Novo BOU</h2><input type="hidden" id="bouId"><div class="row"><label>Data<input id="bouData" type="date"></label><label>Nº BOU<input id="bouNum" placeholder="Número do BOU"></label></div><label>Natureza do fato<input id="natureza" placeholder="Ex: tráfico, porte, apoio..."></label><div class="sectionTitle">Apreensões</div><div class="row3"><label>Pessoas<input id="pessoas" type="number" min="0" value="0"></label><label>Veículos<input id="veiculos" type="number" min="0" value="0"></label><label>Armas<input id="armas" type="number" min="0" value="0"></label></div><div class="sectionTitle">Drogas / Entorpecentes</div><div class="row"><label>Cocaína (g)<input id="cocaina" type="number" min="0" step="0.01" value="0"></label><label>Maconha (g)<input id="maconha" type="number" min="0" step="0.01" value="0"></label><label>Crack (g)<input id="crack" type="number" min="0" step="0.01" value="0"></label><label>Sintéticos (un/g)<input id="sinteticos" type="number" min="0" step="0.01" value="0"></label></div><label>Outros (g/un)<input id="outros" type="number" min="0" step="0.01" value="0"></label><div class="actions"><button class="primary" onclick="salvarBOU()">SALVAR BOU</button><button onclick="limparBOU()">Limpar</button></div><div id="msgBou"></div></div>
  </section>
  <section id="sem" class="screen hidden">
    <div class="card"><h2>Sem ilicitude</h2><div class="row"><label>Tipo<select id="semTipo"><option value="visita">Visita ao Canil</option><option value="apresentacao">Apresentação em evento</option></select></label><label>Data<input id="semData" type="date"></label></div><label id="semLabel">Número de visitantes<input id="semQtd" type="number" min="0" value="0"></label><div class="actions"><button class="green" onclick="salvarSem()">SALVAR</button><button onclick="limparSem()">Limpar</button></div><div id="msgSem"></div></div>
  </section>
  <section id="lista" class="screen hidden">
    <div class="card title"><h2>Registros</h2><button onclick="renderLista()">Atualizar</button></div><div id="listaReg" class="card list"></div>
  </section>
  <section id="backup" class="screen hidden">
    <div class="card"><h2>Backup</h2><p class="muted">Guarde o arquivo JSON em local seguro. Ele recupera todos os registros deste sistema.</p><div class="actions"><button class="blue" onclick="exportarBackup()">Exportar backup JSON</button><label style="display:inline-block"><input type="file" id="importFile" accept="application/json" style="display:none" onchange="importarBackup(event)"><button onclick="document.getElementById('importFile').click()">Restaurar backup</button></label></div><hr style="border-color:#263244"><h3>Senha</h3><input id="novaSenha" type="password" placeholder="Nova senha"><div style="height:8px"></div><button onclick="trocarSenha()">Trocar senha</button><div id="msgBackup"></div></div>
  </section>
</div>
<script>
const DB='canil_mga_db', VER=1; let db, registros=[];
const $=id=>document.getElementById(id); const hoje=()=>new Date().toISOString().slice(0,10); const n=v=>Number(v||0);
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,VER);r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains('registros'))d.createObjectStore('registros',{keyPath:'id'});if(!d.objectStoreNames.contains('config'))d.createObjectStore('config',{keyPath:'key'});};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function tx(store,mode='readonly'){return db.transaction(store,mode).objectStore(store)}
function getAll(){return new Promise(res=>{const r=tx('registros').getAll();r.onsuccess=()=>res(r.result||[]);});}
function put(o){return new Promise(res=>{const r=tx('registros','readwrite').put(o);r.onsuccess=()=>res();});}
function del(id){return new Promise(res=>{const r=tx('registros','readwrite').delete(id);r.onsuccess=()=>res();});}
function cfgGet(key){return new Promise(res=>{const r=tx('config').get(key);r.onsuccess=()=>res(r.result?.value);});}
function cfgSet(key,value){return new Promise(res=>{const r=tx('config','readwrite').put({key,value});r.onsuccess=()=>res();});}
async function init(){db=await openDB(); if(!(await cfgGet('senha'))) await cfgSet('senha','1234'); $('bouData').value=hoje();$('semData').value=hoje();$('semTipo').onchange=()=>{$('semLabel').childNodes[0].textContent=$('semTipo').value==='visita'?'Número de visitantes':'Nº de pessoas atingidas'}; if(localStorage.canilLogado==='1') entrar(); if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});}
async function login(){const ok=$('pass').value===(await cfgGet('senha')); if(ok){localStorage.canilLogado='1';entrar()}else alert('Senha incorreta.');}
async function entrar(){$('login').classList.add('hidden');$('app').classList.remove('hidden');await render();}
function logout(){localStorage.removeItem('canilLogado');location.reload()}
function mesKey(d){return (d||hoje()).slice(0,7)} function mesNome(k){const [a,m]=k.split('-');return `${m}/${a}`}
async function render(){registros=await getAll(); const meses=[...new Set([mesKey(hoje()),...registros.map(r=>mesKey(r.data))])].sort().reverse();$('filtroMes').innerHTML=meses.map(m=>`<option value="${m}">${mesNome(m)}</option>`).join(''); const k=$('filtroMes').value||mesKey(hoje()); $('mesAtual').textContent='Mês: '+mesNome(k); const rs=registros.filter(r=>mesKey(r.data)===k); const s={bou:0,pessoas:0,veiculos:0,armas:0,cocaina:0,maconha:0,crack:0,sinteticos:0,outros:0,visitas:0,apresentacoes:0,atingidas:0};rs.forEach(r=>{if(r.tipo==='bou'){s.bou++;s.pessoas+=n(r.pessoas);s.veiculos+=n(r.veiculos);s.armas+=n(r.armas);s.cocaina+=n(r.cocaina);s.maconha+=n(r.maconha);s.crack+=n(r.crack);s.sinteticos+=n(r.sinteticos);s.outros+=n(r.outros)}else if(r.tipo==='visita'){s.visitas+=n(r.qtd)}else if(r.tipo==='apresentacao'){s.apresentacoes++;s.atingidas+=n(r.qtd)}}); const cards=[['BOU',s.bou],['Pessoas',s.pessoas],['Veículos',s.veiculos],['Armas',s.armas],['Cocaína',fmt(s.cocaina)],['Maconha',fmt(s.maconha)],['Crack',fmt(s.crack)],['Sintéticos',s.sinteticos],['Outros',s.outros],['Visitas',s.visitas],['Apresentações',s.apresentacoes],['Pessoas atingidas',s.atingidas]];$('stats').innerHTML=cards.map(c=>`<div class="stat"><b>${c[1]}</b><span>${c[0]}</span></div>`).join('');renderLista();}
function fmt(g){g=n(g); return g>=1000?(g/1000).toLocaleString('pt-BR',{maximumFractionDigits:3})+' kg':g.toLocaleString('pt-BR',{maximumFractionDigits:2})+' g'}
function show(id){document.querySelectorAll('.screen').forEach(e=>e.classList.add('hidden'));$(id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));$('t-'+id)?.classList.add('active');}
async function salvarBOU(){const id=$('bouId').value||'bou-'+Date.now(); const o={id,tipo:'bou',data:$('bouData').value||hoje(),bou:$('bouNum').value.trim(),natureza:$('natureza').value.trim(),pessoas:n($('pessoas').value),veiculos:n($('veiculos').value),armas:n($('armas').value),cocaina:n($('cocaina').value),maconha:n($('maconha').value),crack:n($('crack').value),sinteticos:n($('sinteticos').value),outros:n($('outros').value),createdAt:new Date().toISOString()}; await put(o); $('msgBou').innerHTML='<div class="ok">BOU salvo com sucesso.</div>'; limparBOU(false); await render();}
function limparBOU(clearMsg=true){['bouId','bouNum','natureza'].forEach(i=>$(i).value='');['pessoas','veiculos','armas','cocaina','maconha','crack','sinteticos','outros'].forEach(i=>$(i).value=0);$('bouData').value=hoje(); if(clearMsg)$('msgBou').innerHTML='';}
async function salvarSem(){const id='sem-'+Date.now(); const tipo=$('semTipo').value; await put({id,tipo,data:$('semData').value||hoje(),qtd:n($('semQtd').value),createdAt:new Date().toISOString()});$('msgSem').innerHTML='<div class="ok">Registro salvo.</div>';limparSem(false);await render();}
function limparSem(clearMsg=true){$('semData').value=hoje();$('semQtd').value=0;if(clearMsg)$('msgSem').innerHTML='';}
function renderLista(){const rs=[...registros].sort((a,b)=>(b.data||'').localeCompare(a.data||'')); if(!rs.length){$('listaReg').innerHTML='<p class="muted">Nenhum registro ainda.</p>';return} $('listaReg').innerHTML=rs.map(r=>{if(r.tipo==='bou')return `<div class="item"><b>BOU ${r.bou||'sem número'}</b> <span class="pill">${br(r.data)}</span><p>${r.natureza||'Sem natureza'}</p><span class="pill">Pessoas: ${r.pessoas}</span><span class="pill">Veículos: ${r.veiculos}</span><span class="pill">Armas: ${r.armas}</span><span class="pill">Maconha: ${fmt(r.maconha)}</span><span class="pill">Cocaína: ${fmt(r.cocaina)}</span><div class="actions"><button onclick="editarBOU('${r.id}')">Editar</button><button class="danger" onclick="excluir('${r.id}')">Excluir</button></div></div>`;return `<div class="item"><b>${r.tipo==='visita'?'Visita ao Canil':'Apresentação em evento'}</b> <span class="pill">${br(r.data)}</span><p>${r.tipo==='visita'?'Visitantes':'Pessoas atingidas'}: <b>${r.qtd}</b></p><div class="actions"><button class="danger" onclick="excluir('${r.id}')">Excluir</button></div></div>`}).join('');}
function br(d){return d?d.split('-').reverse().join('/'):''}
function editarBOU(id){const r=registros.find(x=>x.id===id); if(!r||r.tipo!=='bou')return; ['bouId','bouData','bouNum','natureza','pessoas','veiculos','armas','cocaina','maconha','crack','sinteticos','outros'].forEach(k=>{});$('bouId').value=r.id;$('bouData').value=r.data;$('bouNum').value=r.bou||'';$('natureza').value=r.natureza||'';['pessoas','veiculos','armas','cocaina','maconha','crack','sinteticos','outros'].forEach(k=>$(k).value=r[k]||0);show('bou');window.scrollTo(0,0)}
async function excluir(id){if(confirm('Excluir este registro?')){await del(id);await render();}}
function exportarBackup(){const data={versao:'2.0.0-alpha1-revisada',exportadoEm:new Date().toISOString(),registros}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Canil_Mga_Backup_'+hoje()+'.json';a.click();}
async function importarBackup(e){const f=e.target.files[0]; if(!f)return; const txt=await f.text(); try{const data=JSON.parse(txt); if(!Array.isArray(data.registros)) throw new Error(); if(!confirm('Restaurar backup? Isso vai adicionar/substituir registros com o mesmo ID.'))return; for(const r of data.registros) await put(r); $('msgBackup').innerHTML='<div class="ok">Backup restaurado.</div>'; await render();}catch{alert('Arquivo de backup inválido.')}}
async function trocarSenha(){const v=$('novaSenha').value.trim(); if(v.length<4){alert('Use pelo menos 4 caracteres.');return} await cfgSet('senha',v);$('novaSenha').value='';$('msgBackup').innerHTML='<div class="ok">Senha alterada.</div>';}
init();
</script>
</body>
</html>
