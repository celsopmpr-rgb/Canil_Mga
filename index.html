<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SIO-K9</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1020">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#080b13;--card:#111827;--soft:#172033;--line:#273449;--text:#f8fafc;--muted:#9ca3af;--red:#dc2626;--green:#16a34a;--blue:#2563eb;--yellow:#f59e0b}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06080f,#111827);color:var(--text);font-family:Arial,Helvetica,sans-serif}
.wrap{max-width:1100px;margin:0 auto;padding:14px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;position:sticky;top:0;background:#080b13e8;backdrop-filter:blur(10px);z-index:5;padding:10px 0}
.brand{display:flex;gap:10px;align-items:center}.brand img{width:52px;height:52px;border-radius:13px}.brand h1{font-size:22px;margin:0}.brand small{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 24px #0006;margin-bottom:12px}
.login{max-width:420px;margin:12vh auto;text-align:center}.login img{width:118px;border-radius:24px}.login h1{font-size:34px;margin:12px 0 3px}
input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #374151;background:#05070c;color:var(--text);font-size:16px}
label{font-size:13px;color:#cbd5e1;font-weight:bold;margin:7px 0 5px;display:block}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{background:#0b1220;border:1px solid #263244;border-radius:14px;padding:12px}.stat b{font-size:22px;display:block}.stat span{font-size:12px;color:var(--muted);text-transform:uppercase}
.btn{border:0;border-radius:12px;padding:12px 14px;background:#1f2937;color:white;font-weight:800;font-size:15px;cursor:pointer}.btn.red{background:var(--red)}.btn.green{background:var(--green)}.btn.blue{background:var(--blue)}.btn.yellow{background:var(--yellow);color:#111827}
.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.tab{white-space:nowrap;border:1px solid var(--line);background:#111827;color:white;border-radius:999px;padding:10px 14px;font-weight:bold}.tab.active{background:var(--red);border-color:var(--red)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.row>*{flex:1}.list{border-top:1px solid var(--line);margin-top:10px}.item{padding:10px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.item small{color:var(--muted)}
.actions{display:flex;gap:6px;flex:0}.actions button{padding:8px 10px;font-size:12px}.ok{background:#132f20;border:1px solid #14532d;color:#bbf7d0;border-radius:12px;padding:10px;margin:8px 0}.muted{color:var(--muted)}
.drug{background:#0b1220;border:1px solid #263244;border-radius:14px;padding:12px}.drug h4{margin:0 0 8px}.kg-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.report-head{text-align:center;margin-bottom:18px}.report-head h2,.report-head h3{margin:4px}.report-table{width:100%;border-collapse:collapse}.report-table th,.report-table td{border:1px solid #475569;padding:8px;text-align:left}.report-table th{background:#1f2937}
.footer{text-align:center;color:var(--muted);font-size:12px;margin:16px}
@media(max-width:750px){.grid,.grid3,.grid4{grid-template-columns:1fr}.top{align-items:flex-start}.brand h1{font-size:18px}.tabs{position:sticky;top:76px;background:#080b13;padding:6px 0;z-index:4}.row{display:block}.row>*{margin-bottom:8px}.item{display:block}.actions{margin-top:8px}.stat b{font-size:20px}}
@media print{
  .tabs,.top button,.actions,.no-print,.footer{display:none!important}
  body{background:white;color:black}.wrap{max-width:none}.card,.stat,.drug{box-shadow:none;border:1px solid #999;background:white;color:black}
  input{border:0;color:black}.report-table th{background:#eee;color:black}
}
</style>
</head>
<body><div id="app"></div>
<script>
const VERSION='0.5.2';
const DB='canil_mga_db_v21'; // mantém o mesmo banco das versões anteriores
const STORE='registros', CFG='config';
let state={tab:'dash',registros:[],editId:null,msg:'',mesDash:new Date().toISOString().slice(0,7),mesFechamento:new Date().toISOString().slice(0,7)};
let driveBackupTimer=null;

const $=s=>document.querySelector(s);
const n=v=>Number(v||0);
const fmt=v=>n(v).toLocaleString('pt-BR',{maximumFractionDigits:3});
const today=()=>new Date().toISOString().slice(0,10);
const monthKey=(d=today())=>(d||today()).slice(0,7);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'});if(!db.objectStoreNames.contains(CFG))db.createObjectStore(CFG,{keyPath:'key'});};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
async function store(name,mode='readonly'){const db=await openDB();return db.transaction(name,mode).objectStore(name)}
async function all(){const s=await store(STORE);return new Promise((res,rej)=>{const r=s.getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)})}
async function put(o){const s=await store(STORE,'readwrite');return new Promise((res,rej)=>{const r=s.put(o);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
async function del(id){const s=await store(STORE,'readwrite');return new Promise((res,rej)=>{const r=s.delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
async function getCfg(k){const s=await store(CFG);return new Promise(res=>{const r=s.get(k);r.onsuccess=()=>res(r.result?.value)})}
async function setCfg(k,v){const s=await store(CFG,'readwrite');return new Promise(res=>{const r=s.put({key:k,value:v});r.onsuccess=()=>res()})}

async function getDriveConfig(){return {url:(await getCfg('driveUrl'))||'',token:(await getCfg('driveToken'))||'',auto:(await getCfg('driveAuto'))===true,last:(await getCfg('driveLast'))||''}}
async function saveDriveConfig(){const url=$('#driveUrl').value.trim(),token=$('#driveToken').value.trim(),auto=$('#driveAuto').checked;if(url&&!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(?:\?.*)?$/.test(url)){alert('Cole a URL do aplicativo da web terminada em /exec.');return}if((url||token)&&(!url||token.length<16)){alert('Informe a URL /exec e um token com pelo menos 16 caracteres.');return}await setCfg('driveUrl',url);await setCfg('driveToken',token);await setCfg('driveAuto',auto);state.msg='Configuração do Google Drive salva.';render()}
function scheduleDriveBackup(){clearTimeout(driveBackupTimer);driveBackupTimer=setTimeout(()=>sendDriveBackup(false),1800)}
async function sendDriveBackup(manual=true){
  if(manual){state.msg='Preparando backup para o Google Drive...';render();}
  const c=await getDriveConfig();
  if(!c.url||!c.token){
    if(manual){state.msg='Configure a conexão com o Google Drive.';render();alert('Configure primeiro a URL /exec e o token do Google Drive.');}
    return false;
  }
  if(!manual&&!c.auto)return false;

  const payload={
    token:c.token,
    app:'SIO-K9',
    version:VERSION,
    device:navigator.userAgent,
    exportedAt:new Date().toISOString(),
    registros:state.registros
  };

  try{
    // Envio por formulário oculto: mais compatível com Google Apps Script
    // e não depende de CORS/fetch para executar o doPost.
    let iframe=document.getElementById('sioK9BackupFrame');
    if(!iframe){
      iframe=document.createElement('iframe');
      iframe.id='sioK9BackupFrame';
      iframe.name='sioK9BackupFrame';
      iframe.style.display='none';
      document.body.appendChild(iframe);
    }

    const form=document.createElement('form');
    form.method='POST';
    form.action=c.url;
    form.target='sioK9BackupFrame';
    form.style.display='none';

    const tokenInput=document.createElement('input');
    tokenInput.type='hidden';
    tokenInput.name='token';
    tokenInput.value=c.token;

    const payloadInput=document.createElement('input');
    payloadInput.type='hidden';
    payloadInput.name='payload';
    payloadInput.value=JSON.stringify(payload);

    form.appendChild(tokenInput);
    form.appendChild(payloadInput);
    document.body.appendChild(form);
    form.submit();

    setTimeout(()=>form.remove(),1500);

    const now=new Date().toISOString();
    await setCfg('driveLast',now);

    if(manual){
      alert('Backup enviado. Aguarde alguns segundos e confira a pasta SIO-K9_BACKUPS no Google Drive.');
      state.msg='Solicitação de backup enviada ao Google Drive.';
      render();
    }
    return true;
  }catch(err){
    if(manual){state.msg='Falha no envio do backup.';render();alert('Não foi possível enviar o backup: '+err.message);}
    return false;
  }finally{
    const b=document.getElementById('btnBackupDrive');if(b){b.disabled=false;b.textContent='FAZER BACKUP AGORA'}
  }
}
async function testDriveConnection(){const c=await getDriveConfig();if(!c.url||!c.token){alert('Salve a URL e o token primeiro.');return}jsonpDrive(c.url,'status',c.token,data=>{if(data&&data.ok)alert('Conexão confirmada. O serviço de backup está online.');else alert('Falha na conexão: '+(data?.error||'resposta inválida'))})}
function jsonpDrive(url,action,token,callback){const cb='sioK9Cb_'+Date.now();const s=document.createElement('script');let done=false;window[cb]=data=>{done=true;cleanup();callback(data)};function cleanup(){delete window[cb];s.remove()}s.onerror=()=>{cleanup();alert('Não foi possível consultar o Google Drive. Confira a URL, o token e a implantação.')};s.src=url+(url.includes('?')?'&':'?')+'action='+encodeURIComponent(action)+'&token='+encodeURIComponent(token)+'&callback='+encodeURIComponent(cb)+'&_='+Date.now();document.head.appendChild(s);setTimeout(()=>{if(!done){cleanup();alert('A consulta ao Google Drive demorou demais.')}},15000)}
async function restoreLatestDrive(){const c=await getDriveConfig();if(!c.url||!c.token){alert('Configure a URL e o token primeiro.');return}if(!confirm('Restaurar o backup mais recente do Google Drive? Registros com o mesmo ID serão atualizados.'))return;jsonpDrive(c.url,'latest',c.token,async data=>{try{if(!data?.ok)throw new Error(data?.error||'Falha ao consultar backup');if(!data.found||!data.backup)throw new Error('Nenhum backup foi encontrado no Drive.');const rs=data.backup.registros;if(!Array.isArray(rs))throw new Error('Backup inválido.');for(const r of rs)await put(r);state.msg=`${rs.length} registros restaurados do Google Drive.`;await refresh()}catch(err){alert('Não foi possível restaurar: '+err.message)}})}


function totalGrams(kg,g){return Math.max(0,n(kg))*1000+Math.max(0,n(g))}
function splitWeight(total){total=Math.round(n(total));return {kg:Math.floor(total/1000),g:total%1000}}
function weightText(total){const w=splitWeight(total);return w.kg>0?`${fmt(w.kg)} kg e ${fmt(w.g)} g`:`${fmt(w.g)} g`}
function monthLabel(m){if(!m)return'';const [y,mo]=m.split('-');return new Date(+y,+mo-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}
function dateBR(v){if(!v)return'';const p=String(v).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:v}

async function init(){if(!await getCfg('senha'))await setCfg('senha','1234');state.registros=await all();renderLogin()}
function renderLogin(){document.body.innerHTML='<div id="app"></div>';$('#app').innerHTML=`<div class="login card"><img src="icon-192.png"><h1>SIO-K9</h1><p class="muted">Sistema Integrado de Operações - K9<br>v${VERSION}</p><input id="senha" type="password" inputmode="numeric" placeholder="Senha"><button class="btn red" style="width:100%;margin-top:10px" onclick="login()">ENTRAR</button><p class="muted">Senha inicial: 1234</p></div>`}
async function login(){if($('#senha').value===await getCfg('senha'))render();else alert('Senha incorreta')}
async function refresh(){state.registros=await all();render()}
function go(tab){state.tab=tab;state.editId=null;state.msg='';render()}

function layout(content){return `<div class="wrap"><div class="top"><div class="brand"><img src="icon-192.png"><div><h1>SIO-K9</h1><small>Sistema Integrado de Operações - K9 • v${VERSION}</small></div></div><button class="btn" onclick="renderLogin()">Sair</button></div>
<div class="tabs">
<button class="tab ${state.tab==='dash'?'active':''}" onclick="go('dash')">Início</button>
<button class="tab ${state.tab==='bou'?'active':''}" onclick="go('bou')">Novo BOU</button>
<button class="tab ${state.tab==='sem'?'active':''}" onclick="go('sem')">Sem ilicitude</button>
<button class="tab ${state.tab==='consulta'?'active':''}" onclick="go('consulta')">Consultar</button>
<button class="tab ${state.tab==='fechamento'?'active':''}" onclick="go('fechamento')">Fechamento mensal</button>
<button class="tab ${state.tab==='backup'?'active':''}" onclick="go('backup')">Backup</button>
</div>${state.msg?`<div class="ok">${esc(state.msg)}</div>`:''}${content}<div class="footer">SIO-K9 • Dados locais + backup opcional no Google Drive</div></div>`}

function totals(m){const rs=state.registros.filter(r=>(r.data||'').startsWith(m));const t={bou:0,pessoas:0,veiculos:0,armas:0,cocaina:0,maconha:0,crack:0,sinteticos:0,outros:0,visitas:0,visitantes:0,eventos:0,atingidas:0};
rs.forEach(r=>{if(r.tipo==='bou'){t.bou++;['pessoas','veiculos','armas','cocaina','maconha','crack','sinteticos','outros'].forEach(k=>t[k]+=n(r[k]))}
if(r.tipo==='visita'){t.visitas++;t.visitantes+=n(r.visitantes)}
if(r.tipo==='evento'){t.eventos++;t.atingidas+=n(r.atingidas)}});return t}

function dashboard(){const m=state.mesDash,t=totals(m);return `<div class="card"><div class="row"><div><h2 style="margin:0">Resumo do mês</h2><div class="muted">${monthLabel(m)}</div></div><input type="month" value="${m}" onchange="state.mesDash=this.value;render()"></div></div>
<div class="grid4">
${stat(t.bou,'BOU')}${stat(t.pessoas,'Pessoas')}${stat(t.veiculos,'Veículos')}${stat(t.armas,'Armas')}
${stat(weightText(t.maconha),'Maconha')}${stat(weightText(t.cocaina),'Cocaína')}${stat(weightText(t.crack),'Crack')}${stat(weightText(t.sinteticos),'Sintéticos')}
${stat(weightText(t.outros),'Outros')}${stat(t.visitas,'Visitas ao canil')}${stat(t.visitantes,'Visitantes')}${stat(t.eventos,'Apresentações')}${stat(t.atingidas,'Participantes dos eventos')}
</div><div class="card no-print"><button class="btn red" onclick="go('bou')">+ NOVO BOU</button> <button class="btn blue" onclick="go('sem')">+ SEM ILICITUDE</button> <button class="btn yellow" onclick="go('fechamento')">FECHAMENTO MENSAL</button></div>`}
function stat(v,l){return `<div class="stat"><b>${v}</b><span>${l}</span></div>`}

function drugInput(id,label,total=0){const w=splitWeight(total);return `<div class="drug"><h4>${label}</h4><div class="kg-g"><div><label>Quilos</label><input id="${id}Kg" type="number" min="0" step="1" value="${w.kg}"></div><div><label>Gramas</label><input id="${id}G" type="number" min="0" step="1" value="${w.g}"></div></div></div>`}

function formBou(){const r=state.editId?state.registros.find(x=>x.id===state.editId):{};return `<div class="card"><h2>${state.editId?'Editar':'Novo'} BOU</h2>
<div class="grid3"><div><label>Data *</label><input id="data" type="date" value="${esc(r.data||today())}"></div><div><label>Nº do BOU *</label><input id="bouNum" value="${esc(r.bouNum||'')}" placeholder="Ex.: 2026/000000"></div><div><label>Natureza *</label><input id="natureza" value="${esc(r.natureza||'')}" placeholder="Ex.: Tráfico de drogas"></div></div>
<label>Cão empregado (opcional)</label><input id="cao" value="${esc(r.cao||'')}" placeholder="Ex.: K9 Thor">
<h3>Apreensões</h3><div class="grid3"><div><label>Pessoas</label><input id="pessoas" type="number" min="0" value="${n(r.pessoas)}"></div><div><label>Veículos</label><input id="veiculos" type="number" min="0" value="${n(r.veiculos)}"></div><div><label>Armas</label><input id="armas" type="number" min="0" value="${n(r.armas)}"></div></div>
<h3>Drogas — informe quilos e gramas</h3><div class="grid3">${drugInput('maconha','Maconha',r.maconha)}${drugInput('cocaina','Cocaína',r.cocaina)}${drugInput('crack','Crack',r.crack)}${drugInput('sinteticos','Sintéticos',r.sinteticos)}${drugInput('outros','Outros',r.outros)}<div class="drug"><h4>Qual é a outra droga?</h4><input id="outrosDescricao" value="${esc(r.outrosDescricao||'')}" placeholder="Ex.: haxixe, ice, skunk, ecstasy..."></div></div>
<label>Observações (opcional)</label><textarea id="obs" rows="3">${esc(r.obs||'')}</textarea>
<button class="btn green" onclick="saveBou()">SALVAR BOU</button> ${state.editId?'<button class="btn" onclick="go(\'consulta\')">Cancelar</button>':''}</div>`}

async function saveBou(){const data=$('#data').value,bouNum=$('#bouNum').value.trim(),natureza=$('#natureza').value.trim();if(!data||!bouNum||!natureza){alert('Preencha data, número do BOU e natureza.');return}
const o={id:state.editId||uid(),tipo:'bou',data,bouNum,natureza,cao:$('#cao').value.trim(),pessoas:n($('#pessoas').value),veiculos:n($('#veiculos').value),armas:n($('#armas').value),
maconha:totalGrams($('#maconhaKg').value,$('#maconhaG').value),cocaina:totalGrams($('#cocainaKg').value,$('#cocainaG').value),crack:totalGrams($('#crackKg').value,$('#crackG').value),
sinteticos:totalGrams($('#sinteticosKg').value,$('#sinteticosG').value),outros:totalGrams($('#outrosKg').value,$('#outrosG').value),outrosDescricao:$('#outrosDescricao').value.trim(),obs:$('#obs').value.trim(),updated:new Date().toISOString()};
await put(o);state.editId=null;state.msg='BOU salvo com sucesso.';state.tab='consulta';await refresh();scheduleDriveBackup()}

function formSem(){return `<div class="card"><h2>Sem ilicitude</h2><div class="grid"><div class="drug"><h3>Visita ao Canil</h3><label>Data *</label><input id="vdata" type="date" value="${today()}"><label>Instituição *</label><input id="instituicao" placeholder="Ex.: Escola Maria das Dores"><label>Número de visitantes *</label><input id="visitantes" type="number" min="0" value="0"><button class="btn blue" onclick="saveVisita()">SALVAR VISITA</button></div>
<div class="drug"><h3>Apresentação em evento</h3><label>Data *</label><input id="edata" type="date" value="${today()}"><label>Local *</label><input id="localEvento" placeholder="Ex.: Rotary Club Maringá"><label>Nº de participantes do evento *</label><input id="atingidas" type="number" min="0" value="0"><button class="btn blue" onclick="saveEvento()">SALVAR APRESENTAÇÃO</button></div></div></div>`}
async function saveVisita(){const instituicao=$('#instituicao').value.trim();if(!instituicao){alert('Informe a instituição.');return}await put({id:uid(),tipo:'visita',data:$('#vdata').value||today(),instituicao,visitantes:n($('#visitantes').value),updated:new Date().toISOString()});state.msg='Visita registrada.';state.tab='dash';await refresh();scheduleDriveBackup()}
async function saveEvento(){const local=$('#localEvento').value.trim();if(!local){alert('Informe o local do evento.');return}await put({id:uid(),tipo:'evento',data:$('#edata').value||today(),local,atingidas:n($('#atingidas').value),updated:new Date().toISOString()});state.msg='Apresentação registrada.';state.tab='dash';await refresh();scheduleDriveBackup()}

function consulta(){const q=(state.q||'').toLowerCase(),m=state.mesConsulta||'';const rs=state.registros.filter(r=>(!m||(r.data||'').startsWith(m))&&(!q||JSON.stringify(r).toLowerCase().includes(q))).sort((a,b)=>(a.data||'').localeCompare(b.data||'')||(a.bouNum||'').localeCompare(b.bouNum||''));return `<div class="card"><h2>Consultar registros</h2><div class="row"><input placeholder="Buscar nº do BOU, natureza ou cão" value="${esc(state.q||'')}" oninput="state.q=this.value;render()"><input type="month" value="${esc(m)}" onchange="state.mesConsulta=this.value;render()"></div><div class="list">${rs.map(item).join('')||'<p class="muted">Nenhum registro encontrado.</p>'}</div></div>`}
function item(r){let title='',sub='';if(r.tipo==='bou'){title=`BOU ${esc(r.bouNum)} — ${esc(r.natureza)}`;sub=`${dateBR(r.data)} • Pessoas ${n(r.pessoas)} • Veículos ${n(r.veiculos)} • Armas ${n(r.armas)}${r.cao?' • '+esc(r.cao):''}${r.outrosDescricao?' • Outra droga: '+esc(r.outrosDescricao):''}`}
else if(r.tipo==='visita'){title=`Visita ao Canil — ${esc(r.instituicao||'Instituição não informada')}`;sub=`${dateBR(r.data)} • ${n(r.visitantes)} visitantes`}
else{title=`Apresentação — ${esc(r.local||'Local não informado')}`;sub=`${dateBR(r.data)} • ${n(r.atingidas)} participantes`}
return `<div class="item"><div><b>${title}</b><br><small>${sub}</small></div><div class="actions">${r.tipo==='bou'?`<button class="btn blue" onclick="edit('${r.id}')">Editar</button>`:''}<button class="btn red" onclick="removeReg('${r.id}')">Excluir</button></div></div>`}
function edit(id){state.editId=id;state.tab='bou';render()}
async function removeReg(id){if(confirm('Excluir este registro?')){await del(id);state.msg='Registro excluído.';await refresh();scheduleDriveBackup()}}

function fechamento(){const m=state.mesFechamento,t=totals(m);const bous=state.registros.filter(r=>r.tipo==='bou'&&(r.data||'').startsWith(m)).sort((a,b)=>(a.data||'').localeCompare(b.data||''));
return `<div class="card"><div class="report-head"><h2>SIO-K9</h2><h3>Fechamento Mensal</h3><div>${monthLabel(m)}</div></div>
<div class="no-print"><label>Mês do relatório</label><input type="month" value="${m}" onchange="state.mesFechamento=this.value;render()"><br><button class="btn green" onclick="window.print()">IMPRIMIR / SALVAR EM PDF</button></div>
<h3>Resumo operacional</h3><table class="report-table">
<tr><th>Indicador</th><th>Total</th></tr>
<tr><td>BOU</td><td>${t.bou}</td></tr><tr><td>Pessoas</td><td>${fmt(t.pessoas)}</td></tr><tr><td>Veículos</td><td>${fmt(t.veiculos)}</td></tr><tr><td>Armas</td><td>${fmt(t.armas)}</td></tr>
<tr><td>Maconha</td><td>${weightText(t.maconha)}</td></tr><tr><td>Cocaína</td><td>${weightText(t.cocaina)}</td></tr><tr><td>Crack</td><td>${weightText(t.crack)}</td></tr><tr><td>Sintéticos</td><td>${weightText(t.sinteticos)}</td></tr><tr><td>Outros</td><td>${weightText(t.outros)}</td></tr>
<tr><td>Visitas ao Canil</td><td>${t.visitas}</td></tr><tr><td>Número de visitantes</td><td>${fmt(t.visitantes)}</td></tr><tr><td>Apresentações em eventos</td><td>${t.eventos}</td></tr><tr><td>Pessoas atingidas</td><td>${fmt(t.atingidas)}</td></tr>
</table><h3>Relação dos BOU — ordem crescente de data</h3><table class="report-table"><tr><th>Data</th><th>Nº do BOU</th><th>Natureza</th></tr>${bous.map(r=>`<tr><td>${dateBR(r.data)}</td><td>${esc(r.bouNum)}</td><td>${esc(r.natureza)}</td></tr>`).join('')||'<tr><td colspan="3">Nenhum BOU registrado neste mês.</td></tr>'}</table></div>`}

function backup(){return `<div class="card"><h2>Google Drive — backup automático</h2><p class="muted">Os dados continuam salvos neste aparelho. O Drive recebe uma cópia de segurança automática quando houver internet.</p><label>URL do Aplicativo da Web</label><input id="driveUrl" placeholder="https://script.google.com/macros/s/.../exec"><label>Token secreto</label><input id="driveToken" type="password" placeholder="Token definido no Apps Script"><label style="display:flex;gap:10px;align-items:center"><input id="driveAuto" type="checkbox" style="width:auto"> Fazer backup automaticamente após alterações</label><div class="row"><button class="btn blue" onclick="saveDriveConfig()">SALVAR CONFIGURAÇÃO</button><button class="btn" onclick="testDriveConnection()">TESTAR CONEXÃO</button></div><div class="row" style="margin-top:8px"><button id="btnBackupDrive" class="btn green" onclick="sendDriveBackup(true)">FAZER BACKUP AGORA</button><button class="btn yellow" onclick="restoreLatestDrive()">RESTAURAR DO DRIVE</button></div><p id="driveStatus" class="muted"></p><hr style="border-color:#273449"><h3>Backup local e relatório</h3><button class="btn green" onclick="exportBackup()">EXPORTAR BACKUP JSON</button> <button class="btn yellow" onclick="exportAllPDF()">EXPORTAR PDF / DRIVE</button><label class="btn blue" style="display:inline-block;margin-top:8px">RESTAURAR ARQUIVO JSON<input type="file" accept="application/json" style="display:none" onchange="importBackup(event)"></label><hr style="border-color:#273449"><h3>Alterar senha</h3><input id="novaSenha" type="password" placeholder="Nova senha"><button class="btn red" onclick="trocarSenha()">ALTERAR SENHA</button></div>`}
function exportBackup(){const data={app:'SIO-K9',version:VERSION,created:new Date().toISOString(),registros:state.registros};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`SIO-K9_backup_${today()}.json`;a.click();URL.revokeObjectURL(a.href)}
function exportAllPDF(){const rs=[...state.registros].sort((a,b)=>(a.data||'').localeCompare(b.data||''));const bous=rs.filter(r=>r.tipo==='bou');const atos=rs.filter(r=>r.tipo!=='bou');const html=`<!doctype html><html><head><meta charset="utf-8"><title>SIO-K9 - Todos os dados</title><style>body{font-family:Arial;padding:24px;color:#111}h1,h2{text-align:center}table{width:100%;border-collapse:collapse;margin:16px 0}th,td{border:1px solid #777;padding:7px;text-align:left}th{background:#eee}.small{font-size:12px;color:#555}</style></head><body><h1>SIO-K9</h1><h2>Relatório geral de dados</h2><p class="small">Gerado em ${new Date().toLocaleString('pt-BR')}</p><h3>BOU registrados</h3><table><tr><th>Data</th><th>Nº BOU</th><th>Natureza</th><th>Pessoas</th><th>Veículos</th><th>Armas</th></tr>${bous.map(r=>`<tr><td>${dateBR(r.data)}</td><td>${esc(r.bouNum)}</td><td>${esc(r.natureza)}</td><td>${n(r.pessoas)}</td><td>${n(r.veiculos)}</td><td>${n(r.armas)}</td></tr>`).join('')||'<tr><td colspan="6">Nenhum BOU cadastrado.</td></tr>'}</table><h3>Atividades sem ilicitude</h3><table><tr><th>Data</th><th>Tipo</th><th>Instituição / Local</th><th>Participantes</th></tr>${atos.map(r=>`<tr><td>${dateBR(r.data)}</td><td>${r.tipo==='visita'?'Visita ao Canil':'Apresentação em evento'}</td><td>${esc(r.tipo==='visita'?(r.instituicao||'Não informado'):(r.local||'Não informado'))}</td><td>${fmt(r.tipo==='visita'?r.visitantes:r.atingidas)}</td></tr>`).join('')||'<tr><td colspan="4">Nenhuma atividade cadastrada.</td></tr>'}</table><p><b>Para salvar no Google Drive:</b> escolha Salvar como PDF e depois Compartilhar > Drive.</p><script>window.onload=()=>setTimeout(()=>window.print(),400)<\/script></body></html>`;const w=window.open('','_blank');if(!w){alert('Permita pop-ups para gerar o PDF.');return}w.document.open();w.document.write(html);w.document.close()}
async function importBackup(e){try{const f=e.target.files[0];if(!f)return;const data=JSON.parse(await f.text());if(!Array.isArray(data.registros))throw new Error('Arquivo inválido');if(!confirm(`Restaurar ${data.registros.length} registros?`))return;for(const r of data.registros)await put(r);state.msg='Backup restaurado com sucesso.';await refresh();scheduleDriveBackup()}catch(err){alert('Não foi possível restaurar: '+err.message)}}
async function trocarSenha(){const v=$('#novaSenha').value.trim();if(v.length<4){alert('Use pelo menos 4 caracteres.');return}await setCfg('senha',v);alert('Senha alterada com sucesso.')}

async function hydrateDriveForm(){const c=await getDriveConfig();if($('#driveUrl'))$('#driveUrl').value=c.url;if($('#driveToken'))$('#driveToken').value=c.token;if($('#driveAuto'))$('#driveAuto').checked=c.auto;if($('#driveStatus'))$('#driveStatus').textContent=c.last?'Último envio registrado: '+new Date(c.last).toLocaleString('pt-BR'):'Nenhum envio registrado neste aparelho.'}
function render(){let content='';if(state.tab==='dash')content=dashboard();if(state.tab==='bou')content=formBou();if(state.tab==='sem')content=formSem();if(state.tab==='consulta')content=consulta();if(state.tab==='fechamento')content=fechamento();if(state.tab==='backup')content=backup();$('#app').innerHTML=layout(content);if(state.tab==='backup')hydrateDriveForm()}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(console.warn)}
init();
</script></body></html>
