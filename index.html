<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Canil_Mga</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#b91c1c"><link rel="apple-touch-icon" href="icon-192.png"><style>
:root{--bg:#080b10;--card:#111827;--muted:#9ca3af;--text:#f9fafb;--red:#dc2626;--green:#16a34a;--line:#1f2937;--blue:#2563eb}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#050608,#111827);color:var(--text);font-family:Arial,Helvetica,sans-serif}.wrap{max-width:980px;margin:auto;padding:14px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:14px}.brand{display:flex;gap:10px;align-items:center}.brand img{width:48px;height:48px;border-radius:12px}.small{color:var(--muted);font-size:12px}.card{background:rgba(17,24,39,.95);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.18)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{border:1px solid #263244;border-radius:14px;padding:12px;background:#0b1220}.stat b{font-size:22px;display:block;margin-top:4px}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.tab,.btn{border:0;border-radius:12px;padding:11px 13px;background:#1f2937;color:#fff;font-weight:700}.tab.active{background:var(--red)}.btn.primary{background:var(--red)}.btn.ok{background:var(--green)}.btn.blue{background:var(--blue)}input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #374151;background:#050a12;color:#fff;margin:5px 0 10px}label{font-size:13px;color:#d1d5db}textarea{min-height:76px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.list{border-top:1px solid var(--line);margin-top:10px}.item{padding:10px 0;border-bottom:1px solid var(--line)}.actions{display:flex;gap:8px;flex-wrap:wrap}.hide{display:none}.login{max-width:420px;margin:8vh auto}.warn{background:#3b1d1d;border:1px solid #7f1d1d;border-radius:12px;padding:10px;color:#fecaca}@media(max-width:650px){.grid,.row{grid-template-columns:1fr}.top{align-items:flex-start}.tabs{position:sticky;top:0;background:#080b10;z-index:3;padding-top:8px}}
</style></head><body><div id="app"></div><script>
const DB='canil_mga_db_v2_enxuto', VERSION=1;let db;const $=s=>document.querySelector(s), app=$('#app');
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,VERSION);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('bou'))d.createObjectStore('bou',{keyPath:'id'});if(!d.objectStoreNames.contains('sem'))d.createObjectStore('sem',{keyPath:'id'});if(!d.objectStoreNames.contains('config'))d.createObjectStore('config',{keyPath:'key'});};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=()=>rej(r.error)})}
function store(name,mode='readonly'){return db.transaction(name,mode).objectStore(name)}
function all(name){return new Promise(res=>{const r=store(name).getAll();r.onsuccess=()=>res(r.result||[])})}
function put(name,obj){return new Promise(res=>{const r=store(name,'readwrite').put(obj);r.onsuccess=()=>res()})}
function del(name,id){return new Promise(res=>{const r=store(name,'readwrite').delete(id);r.onsuccess=()=>res()})}
function cfg(key){return new Promise(res=>{const r=store('config').get(key);r.onsuccess=()=>res(r.result?.value)})}
function setCfg(key,value){return put('config',{key,value})}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);const num=x=>Number(String(x||'').replace(',','.'))||0;const br=n=>Number(n||0).toLocaleString('pt-BR',{maximumFractionDigits:3});
function ym(d){return (d||new Date().toISOString().slice(0,10)).slice(0,7)} function thisMonth(){return new Date().toISOString().slice(0,7)}
async function init(){await openDB();if(!await cfg('senha'))await setCfg('senha','1234'); if(localStorage.canil_mga_logado==='1')render(); else login()}
function login(msg=''){app.innerHTML=`<div class="wrap"><div class="login card"><center><img src="icon-192.png" width="96" style="border-radius:22px"><h1>Canil_Mga</h1><p class="small">Sistema enxuto de registros</p></center>${msg?`<p class="warn">${msg}</p>`:''}<label>Senha</label><input id="pass" type="password" placeholder="Digite a senha"><button class="btn primary" style="width:100%" onclick="doLogin()">Entrar</button><p class="small">Senha inicial: 1234</p></div></div>`}
async function doLogin(){if($('#pass').value===await cfg('senha')){localStorage.canil_mga_logado='1';render()}else login('Senha incorreta.')}
async function render(tab='dash'){app.innerHTML=`<div class="wrap"><div class="top"><div class="brand"><img src="icon-192.png"><div><h2 style="margin:0">Canil_Mga</h2><div class="small">Versão 2.0 enxuta • rápido e funcional</div></div></div><button class="btn" onclick="localStorage.removeItem('canil_mga_logado');login()">Sair</button></div><div class="tabs"><button class="tab ${tab==='dash'?'active':''}" onclick="render('dash')">Início</button><button class="tab ${tab==='bou'?'active':''}" onclick="render('bou')">BOU</button><button class="tab ${tab==='sem'?'active':''}" onclick="render('sem')">Sem ilicitude</button><button class="tab ${tab==='backup'?'active':''}" onclick="render('backup')">Backup</button><button class="tab ${tab==='config'?'active':''}" onclick="render('config')">Senha</button></div><div id="view"></div></div>`; if(tab==='dash')dash(); if(tab==='bou')bou(); if(tab==='sem')sem(); if(tab==='backup')backup(); if(tab==='config')config();}
async function dash(){const m=thisMonth(), b=(await all('bou')).filter(x=>ym(x.data)===m), s=(await all('sem')).filter(x=>ym(x.data)===m);let t={bou:b.length,pessoas:0,veiculos:0,armas:0,cocaina:0,maconha:0,crack:0,sinteticos:0,outros:0,visitas:0,eventos:0,atingidas:0};b.forEach(x=>{t.pessoas+=num(x.pessoas);t.veiculos+=num(x.veiculos);t.armas+=num(x.armas);['cocaina','maconha','crack','sinteticos','outros'].forEach(k=>t[k]+=num(x[k]));});s.forEach(x=>{if(x.tipo==='visita')t.visitas+=num(x.visitantes);if(x.tipo==='evento'){t.eventos++;t.atingidas+=num(x.atingidas)}});$('#view').innerHTML=`<div class="card"><h3>Resumo do mês ${m.split('-').reverse().join('/')}</h3><div class="grid">${[['BOU',t.bou],['Pessoas',t.pessoas],['Veículos',t.veiculos],['Armas',t.armas],['Cocaína',br(t.cocaina)+' g'],['Maconha',br(t.maconha)+' g'],['Crack',br(t.crack)+' g'],['Sintéticos',br(t.sinteticos)],['Outros',br(t.outros)+' g'],['Visitantes',t.visitas],['Eventos',t.eventos],['Pessoas atingidas',t.atingidas]].map(a=>`<div class="stat"><span>${a[0]}</span><b>${a[1]}</b></div>`).join('')}</div></div>`}
function formBou(x={}){$('#view').innerHTML=`<div class="card"><h3>${x.id?'Editar':'Novo'} BOU</h3><input id="id" type="hidden" value="${x.id||''}"><div class="row"><div><label>Data</label><input id="data" type="date" value="${x.data||new Date().toISOString().slice(0,10)}"></div><div><label>Nº do BOU</label><input id="bouN" value="${x.bouN||''}"></div></div><label>Natureza do fato</label><input id="natureza" value="${x.natureza||''}"><h4>Apreensões</h4><div class="row"><div><label>Pessoas</label><input id="pessoas" type="number" value="${x.pessoas||''}"></div><div><label>Veículos</label><input id="veiculos" type="number" value="${x.veiculos||''}"></div><div><label>Armas</label><input id="armas" type="number" value="${x.armas||''}"></div></div><h4>Drogas / Quantidade</h4><p class="small">Use gramas para cocaína, maconha, crack e outros. Sintéticos pode ser unidade/comprimido.</p><div class="row"><div><label>Cocaína</label><input id="cocaina" inputmode="decimal" value="${x.cocaina||''}"></div><div><label>Maconha</label><input id="maconha" inputmode="decimal" value="${x.maconha||''}"></div><div><label>Crack</label><input id="crack" inputmode="decimal" value="${x.crack||''}"></div><div><label>Sintéticos</label><input id="sinteticos" inputmode="decimal" value="${x.sinteticos||''}"></div><div><label>Outros</label><input id="outros" inputmode="decimal" value="${x.outros||''}"></div></div><label>Observações</label><textarea id="obs">${x.obs||''}</textarea><div class="actions"><button class="btn ok" onclick="saveBou()">Salvar</button><button class="btn" onclick="bou()">Cancelar</button></div></div>`}
async function bou(){const q=''; const list=(await all('bou')).sort((a,b)=>(b.data||'').localeCompare(a.data||''));$('#view').innerHTML=`<div class="card"><div class="actions"><button class="btn primary" onclick="formBou()">+ Novo BOU</button></div><label>Pesquisa rápida</label><input id="searchBou" placeholder="Nº BOU ou natureza" oninput="filterBou()"><div class="list" id="bouList">${list.map(itemBou).join('')}</div></div>`}
function itemBou(x){return `<div class="item" data-text="${(x.bouN+' '+x.natureza).toLowerCase()}"><b>${x.data||''} • BOU ${x.bouN||'-'}</b><div class="small">${x.natureza||''}</div><div class="actions"><button class="btn" onclick='editBou(${JSON.stringify(x)})'>Editar</button><button class="btn" onclick="delBou('${x.id}')">Excluir</button></div></div>`}
function filterBou(){const v=$('#searchBou').value.toLowerCase();document.querySelectorAll('#bouList .item').forEach(i=>i.style.display=i.dataset.text.includes(v)?'block':'none')}
function editBou(x){formBou(x)} async function saveBou(){const x={id:$('#id').value||uid(),data:$('#data').value,bouN:$('#bouN').value,natureza:$('#natureza').value,pessoas:$('#pessoas').value,veiculos:$('#veiculos').value,armas:$('#armas').value,cocaina:$('#cocaina').value,maconha:$('#maconha').value,crack:$('#crack').value,sinteticos:$('#sinteticos').value,outros:$('#outros').value,obs:$('#obs').value};await put('bou',x);bou()} async function delBou(id){if(confirm('Excluir este BOU?')){await del('bou',id);bou()}}
function formSem(tipo,x={}){const visita=tipo==='visita';$('#view').innerHTML=`<div class="card"><h3>${visita?'Visita ao Canil':'Apresentação em Evento'}</h3><input id="id" type="hidden" value="${x.id||''}"><input id="tipo" type="hidden" value="${tipo}"><label>Data</label><input id="data" type="date" value="${x.data||new Date().toISOString().slice(0,10)}">${visita?`<label>Instituição/Escola</label><input id="nome" value="${x.nome||''}"><label>Número de visitantes</label><input id="visitantes" type="number" value="${x.visitantes||''}">`:`<label>Evento</label><input id="nome" value="${x.nome||''}"><label>Local</label><input id="local" value="${x.local||''}"><label>Nº de pessoas atingidas</label><input id="atingidas" type="number" value="${x.atingidas||''}">`}<label>Observações</label><textarea id="obs">${x.obs||''}</textarea><div class="actions"><button class="btn ok" onclick="saveSem()">Salvar</button><button class="btn" onclick="sem()">Cancelar</button></div></div>`}
async function sem(){const list=(await all('sem')).sort((a,b)=>(b.data||'').localeCompare(a.data||''));$('#view').innerHTML=`<div class="card"><div class="actions"><button class="btn blue" onclick="formSem('visita')">+ Visita ao Canil</button><button class="btn primary" onclick="formSem('evento')">+ Apresentação</button></div><div class="list">${list.map(x=>`<div class="item"><b>${x.data} • ${x.tipo==='visita'?'Visita':'Apresentação'}</b><div class="small">${x.nome||''} ${x.visitantes?(' • visitantes: '+x.visitantes):''}${x.atingidas?(' • atingidas: '+x.atingidas):''}</div><div class="actions"><button class="btn" onclick='formSem("${x.tipo}",${JSON.stringify(x)})'>Editar</button><button class="btn" onclick="delSem('${x.id}')">Excluir</button></div></div>`).join('')}</div></div>`}
async function saveSem(){const tipo=$('#tipo').value;const x={id:$('#id').value||uid(),tipo,data:$('#data').value,nome:$('#nome').value,obs:$('#obs').value}; if(tipo==='visita')x.visitantes=$('#visitantes').value; else {x.local=$('#local').value;x.atingidas=$('#atingidas').value} await put('sem',x);sem()} async function delSem(id){if(confirm('Excluir registro?')){await del('sem',id);sem()}}
async function backup(){const data={versao:'2.0-enxuta',dataBackup:new Date().toISOString(),bou:await all('bou'),sem:await all('sem'),senha:await cfg('senha')};$('#view').innerHTML=`<div class="card"><h3>Backup</h3><p>Faça backup antes de qualquer atualização.</p><div class="actions"><button class="btn ok" onclick='downloadBackup(${JSON.stringify(data)})'>Exportar backup JSON</button><label class="btn blue">Restaurar backup<input type="file" accept="application/json" style="display:none" onchange="restoreBackup(this.files[0])"></label></div></div>`}
function downloadBackup(data){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='Canil_Mga_Backup_'+new Date().toISOString().slice(0,10)+'.json';a.click()}
async function restoreBackup(file){if(!file)return;const txt=await file.text();const data=JSON.parse(txt);if(!confirm('Restaurar backup? Isso adiciona/substitui registros com o mesmo ID.'))return;for(const x of data.bou||[])await put('bou',x);for(const x of data.sem||[])await put('sem',x);if(data.senha)await setCfg('senha',data.senha);alert('Backup restaurado.');render('dash')}
async function config(){ $('#view').innerHTML=`<div class="card"><h3>Alterar senha</h3><label>Nova senha</label><input id="newpass" type="password"><button class="btn ok" onclick="changePass()">Salvar nova senha</button></div>`} async function changePass(){const p=$('#newpass').value.trim(); if(p.length<4)return alert('Use pelo menos 4 caracteres.'); await setCfg('senha',p); alert('Senha alterada.'); render('dash')}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');init();
</script></body></html>
